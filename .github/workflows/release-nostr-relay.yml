name: Build and Release

on:
  workflow_dispatch:
    inputs:
      relay_tag:
        description: "nostr-rs-relay git tag or commit to build"
        required: true
        default: "master"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: nostr-rs-relay-linux-x86_64

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: nostr-rs-relay-linux-aarch64

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: nostr-rs-relay-macos-x86_64

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: nostr-rs-relay-macos-aarch64

    steps:
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake protobuf-compiler gcc-aarch64-linux-gnu

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf cmake

      - name: Checkout nostr-rs-relay
        uses: actions/checkout@v4
        with:
          repository: scsibug/nostr-rs-relay
          ref: ${{ inputs.relay_tag }}

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Configure cross-compilation (Linux aarch64 only)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          cp target/${{ matrix.target }}/release/nostr-rs-relay ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Compute SHA256 checksums
        run: |
          for dir in nostr-rs-relay-*/; do
            binary="${dir%/}"
            sha256sum "$binary/$binary" | awk '{print $1}' > "$binary/$binary.sha256"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: relay-${{ inputs.relay_tag }}
          name: "nostr-rs-relay ${{ inputs.relay_tag }}"
          files: |
            nostr-rs-relay-linux-x86_64/nostr-rs-relay-linux-x86_64
            nostr-rs-relay-linux-x86_64/nostr-rs-relay-linux-x86_64.sha256
            nostr-rs-relay-linux-aarch64/nostr-rs-relay-linux-aarch64
            nostr-rs-relay-linux-aarch64/nostr-rs-relay-linux-aarch64.sha256
            nostr-rs-relay-macos-x86_64/nostr-rs-relay-macos-x86_64
            nostr-rs-relay-macos-x86_64/nostr-rs-relay-macos-x86_64.sha256
            nostr-rs-relay-macos-aarch64/nostr-rs-relay-macos-aarch64
            nostr-rs-relay-macos-aarch64/nostr-rs-relay-macos-aarch64.sha256
